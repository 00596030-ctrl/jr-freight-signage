<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JR貨物 運行情報サイネージ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
            padding: 30px; /* 少しだけ上下の余白を詰めて表示領域を広げました */
        }
        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #38bdf8;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .title-area { display: flex; align-items: center; }
        .logo-badge {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 6px 16px;
            font-weight: bold;
            font-size: 20pt;
            border-radius: 6px;
            margin-right: 20px;
        }
        h1 { font-size: 28pt; letter-spacing: 1px; }
        .time-area { text-align: right; font-size: 16pt; color: #94a3b8; }
        
        /* 輸送状況を表示するメインパネル */
        .status-panel {
            background-color: #1e293b;
            border-radius: 16px;
            padding: 40px;
            flex-grow: 1;
            margin-bottom: 20px;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            
            /* 自動スクロールを滑らかにするための設定 */
            overflow-y: hidden; /* スクロールバーは邪魔なので非表示に */
            position: relative;
        }
        
        /* スクロールさせるための中身のコンテナ */
        .scroller-inner {
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
            transition: transform 0.3s ease-out; /* 手動調整用の微小な猶予 */
        }
        
        #info-content {
            font-size: 22pt; /* サイネージとして見やすいよう少し文字を大きくしました */
            line-height: 1.8;
            white-space: pre-wrap;
            letter-spacing: 0.5px;
        }
        
        footer {
            display: flex;
            justify-content: space-between;
            font-size: 13pt; /* フッターのサイズを少し小さくして圧迫感を減らしました */
            color: #475569;
            border-top: 1px solid #1e293b;
            padding-top: 10px;
        }
        
        .loading {
            color: #38bdf8;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="title-area">
                <div class="logo-badge">JR貨物</div>
                <h1>現在の輸送状況（社内情報サイネージ）</h1>
            </div>
            <div class="time-area">
                <div>情報更新: <span id="update-time">-</span></div>
                <div style="font-size: 11pt; margin-top: 4px; color: #475569;">サイネージ自動更新: 10分毎</div>
            </div>
        </header>

        <div class="status-panel" id="panel">
            <div class="scroller-inner" id="scroller">
                <div id="info-content" class="loading">運行情報を読み込み中...</div>
            </div>
        </div>

        <footer>
            <div>※本画面は社内専用表示です（外部非公開）</div>
            <div>データソース: JR貨物公式HP</div>
        </footer>
    </div>

    <script>
        // ★★★ここにあなたのGASのウェブアプリURL（最新のもの）を貼り付けてください★★★
        const GAS_URL = "https://script.google.com/a/macros/kuronekoyamato.co.jp/s/AKfycbwbTIaek3YgSUv69qhey4iSnuQORVafhVf9veuQRPAE4ayp7ix7373ivR4WETBopRxD/exec"; 

        let scrollTimer = null;

        // データを取得して画面を書き換える関数
        async function fetchStatus() {
            // 新しいデータを取る前に、動いているスクロールタイマーを一度リセットする
            if (scrollTimer) clearTimeout(scrollTimer);
            
            const contentArea = document.getElementById("info-content");
            if (!contentArea) return;
            
            try {
                const script = document.createElement('script');
                script.src = GAS_URL + "?callback=renderSignage";
                document.body.appendChild(script);
                document.body.removeChild(script);
            } catch (error) {
                contentArea.innerText = "エラーが発生しました。";
            }
        }

        // GASからデータを受け取って画面を描画する専用の関数
        window.renderSignage = function(data) {
            const contentArea = document.getElementById("info-content");
            const timeArea = document.getElementById("update-time");
            
            if (!contentArea || !timeArea) return;
            
            if (data.status === "success") {
                let formattedContent = data.content
                    .replace(/ 標 題 /g, "\n\n■ 標題：\n")
                    .replace(/ 発生時刻・概要 /g, "\n\n■ 発生時刻・概要：\n")
                    .replace(/ 線 区 /g, "\n\n■ 影響線区・列車遅延：\n")
                    .replace(/ \(1\)/g, "\n (1)")
                    .replace(/ \(2\)/g, "\n (2)")
                    .replace(/ \(3\)/g, "\n (3)")
                    .replace(/ 列車\(/g, "\n 列車(");

                contentArea.classList.remove("loading");
                contentArea.innerText = formattedContent;
                timeArea.innerText = data.last_update;

                // データが画面に反映された後、少し待ってからスクロール判定を開始する
                setTimeout(startAutoScroll, 1000);
            }
        };

        // 自動スクロールを制御する関数
        function startAutoScroll() {
            const panel = document.getElementById("panel");
            const scroller = document.getElementById("scroller");
            
            if (!panel || !scroller) return;

            // 外枠の高さ（表示できる範囲）
            const panelHeight = panel.clientHeight - 80; // 上下パディング40pxずつを引く
            // 中身（文字全体）の高さ
            const scrollerHeight = scroller.offsetHeight;

            // もし文字が枠内に収まっているならスクロールはしない
            if (scrollerHeight <= panelHeight) {
                scroller.style.transform = "translateY(0px)";
                return;
            }

            // スクロールしなければいけない距離
            const scrollDistance = scrollerHeight - panelHeight;
            
            let currentY = 0;
            
            function loop() {
                // 1. 最初の上端で5秒停止
                scrollTimer = setTimeout(() => {
                    
                    // 2. ゆっくり下にスクロールを開始（1フレームごとに0.5ピクセル進む。数字を大きくすると速くなります）
                    function scrollDown() {
                        if (currentY > -scrollDistance) {
                            currentY -= 0.5; 
                            scroller.style.transform = `translateY(${currentY}px)`;
                            scrollTimer = requestAnimationFrame(scrollDown);
                        } else {
                            // 3. 一番下まで行ったら、下端で5秒停止
                            scrollTimer = setTimeout(() => {
                                // 4. スナップして一瞬で上に（0.5秒かけて）戻る
                                scroller.style.transition = "transform 0.5s ease-in-out";
                                currentY = 0;
                                scroller.style.transform = "translateY(0px)";
                                
                                // アニメーションが戻るのを待ってからループを再起動
                                setTimeout(() => {
                                    scroller.style.transition = "none"; // スクロール用に戻す
                                    loop();
                                }, 600);
                                
                            }, 5000); // 下端での停止時間（5秒）
                        }
                    }
                    
                    scroller.style.transition = "none"; // スクロール中は滑らかに動かすためアニメーションを切る
                    scrollDown();
                    
                }, 5000); // 上端での停止時間（5秒）
            }

            // ループの開始
            loop();
        }

        // 画面が開かれた時に一回実行
        fetchStatus();

        // その後、10分（600,000ミリ秒）ごとに自動データ更新
        setInterval(fetchStatus, 600000);
    </script>
</body>
</html>
