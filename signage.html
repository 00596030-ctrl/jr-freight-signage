<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JR貨物 運行情報サイネージ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            padding: 25px 25px 0 25px;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #38bdf8;
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .title-area { display: flex; align-items: center; }
        .logo-badge {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 6px 16px;
            font-weight: bold;
            font-size: 20pt;
            border-radius: 6px;
            margin-right: 20px;
        }
        h1 { font-size: 28pt; letter-spacing: 1px; }
        .time-area { text-align: right; font-size: 16pt; color: #94a3b8; }
        
        .status-panel {
            background-color: #1e293b;
            border-radius: 16px;
            padding: 30px;
            flex-grow: 1;
            margin-bottom: 15px;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            overflow: hidden; /* AndroidのWebView互換性のためにhiddenに固定 */
            position: relative;
        }
        
        .scroll-inner-container {
            position: absolute;
            width: calc(100% - 60px);
            top: 30px;
        }
        
        #info-content {
            font-size: 22pt;
            line-height: 1.8;
            white-space: pre-wrap;
            letter-spacing: 0.5px;
        }
        
        footer {
            display: flex;
            justify-content: space-between;
            font-size: 13pt;
            color: #475569;
            border-top: 1px solid #1e293b;
            padding-top: 10px;
            padding-bottom: 15px;
            flex-shrink: 0;
        }
        
        .loading {
            color: #38bdf8;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container" style="display:flex; flex-direction:column; height:100vh;">
        <header>
            <div class="title-area">
                <div class="logo-badge">JR貨物</div>
                <h1>現在の輸送状況（社内情報サイネージ）</h1>
            </div>
            <div class="time-area">
                <div>情報更新: <span id="update-time">-</span></div>
                <div style="font-size: 11pt; margin-top: 4px; color: #475569;">サイネージ自動更新: 10分毎</div>
            </div>
        </header>

        <div class="status-panel" id="outer-box">
            <div class="scroll-inner-container" id="inner-container">
                <div id="info-content" class="loading">運行情報を読み込み中...</div>
            </div>
        </div>

        <footer>
            <div>※本画面は社内専用表示です（外部非公開）</div>
            <div>データソース: JR貨物公式HP</div>
        </footer>
    </div>

    <script>
        let scrollIntervalTimer = null;

        function fetchJRStatusOnly() {
            // 前回のJARTICと同じように、足元にあるdata.jsonを読み込みに行く（キャッシュ対策の時間を添えて）
            const jsonUrl = `./data.json?t=${new Date().getTime()}`;

            fetch(jsonUrl)
                .then(response => {
                    if (!response.ok) throw new Error("data.jsonが見つかりません。");
                    return response.json();
                })
                .then(jsonData => {
                    updateFreightBoard(jsonData);
                })
                .catch(error => {
                    console.error("データ同期エラー:", error);
                    document.getElementById("info-content").innerText = "データの読み込み中にエラーが発生しました。";
                });
        }

        function updateFreightBoard(data) {
            const contentArea = document.getElementById("info-content");
            const timeArea = document.getElementById("update-time");
            
            if (data.status === "success") {
                // 文字の整形
                let formattedContent = data.content
                    .replace(/ 標 題 /g, "\n\n■ 標題：\n")
                    .replace(/ 発生時刻・概要 /g, "\n\n■ 発生時刻・概要：\n")
                    .replace(/ 線 区 /g, "\n\n■ 影響線区・列車遅延：\n")
                    .replace(/ \(1\)/g, "\n (1)")
                    .replace(/ \(2\)/g, "\n (2)")
                    .replace(/ \(3\)/g, "\n (3)")
                    .replace(/ 列車\(/g, "\n 列車(");

                contentArea.classList.remove("loading");
                contentArea.innerText = formattedContent;
                timeArea.innerText = data.last_update;

                // スクロールエンジンの再起動
                startFreightScrollEngine();
            }
        }

        function startFreightScrollEngine() {
            if (scrollIntervalTimer) clearInterval(scrollIntervalTimer);

            const outerBox = document.getElementById("outer-box");
            const innerBox = document.getElementById("inner-container");
            innerBox.style.top = "30px"; 
            
            // 1. 最初の5秒停止
            setTimeout(() => {
                const outerHeight = outerBox.clientHeight;
                const innerHeight = innerBox.clientHeight;
                
                // 文字がハミ出ている場合のみスクロール開始
                if (innerHeight > outerHeight - 60) {
                    let currentTop = 30;
                    const maxScroll = -(innerHeight - outerHeight + 40);
                    
                    // 2. 古いAndroid（仕様）でも100%安定して動くクラシックなミリ秒タイマーでのスクロール
                    const timer = setInterval(() => {
                        currentTop -= 1;
                        innerBox.style.top = currentTop + "px";
                        
                        if (currentTop <= maxScroll) {
                            clearInterval(timer);
                            // 3. 一番下まで来たら5秒停止したあと、上に戻ってループ
                            setTimeout(() => {
                                innerBox.style.top = "30px";
                                setTimeout(() => startFreightScrollEngine(), 1000);
                            }, 5000); 
                        }
                    }, 40); // 40ミリ秒ごとに1px動く（ゆっくりスクロール）
                    
                    scrollIntervalTimer = timer;
                }
            }, 5000); 
        }

        // 定期データリロード：10分毎（600000ミリ秒）
        setInterval(fetchJRStatusOnly, 600000); 
        // 起動時に一発目を実行
        setTimeout(fetchJRStatusOnly, 100);
    </script>
</body>
</html>
