<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JR貨物 運行情報サイネージ（北海道着）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            padding: 25px 25px 0 25px;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #38bdf8;
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .title-area { display: flex; align-items: center; }
        .logo-badge {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 6px 16px;
            font-weight: bold;
            font-size: 20pt;
            border-radius: 6px;
            margin-right: 20px;
        }
        h1 { font-size: 28pt; letter-spacing: 1px; }
        
        .status-panel {
            background-color: #1e293b;
            border-radius: 16px;
            padding: 40px;
            flex-grow: 1;
            margin-bottom: 15px;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }
        
        .scroll-inner-container {
            position: absolute;
            width: calc(100% - 80px);
            top: 40px;
        }
        
        #info-content {
            font-size: 24pt;
            line-height: 1.8;
            white-space: pre-wrap;
            letter-spacing: 0.5px;
        }
        
        .highlight-status {
            display: inline-block;
            background-color: #ef4444;
            color: #ffffff;
            font-weight: bold;
            padding: 5px 20px;
            border-radius: 4px;
            font-size: 26pt;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .section-header {
            display: block;
            background-color: #0284c7;
            color: #ffffff;
            font-weight: bold;
            padding: 8px 20px;
            border-left: 10px solid #38bdf8;
            font-size: 24pt;
            margin-top: 35px;
            margin-bottom: 15px;
            border-radius: 0 6px 6px 0;
        }
        
        .indent-text {
            display: block;
            padding-left: 25px;
            margin-bottom: 10px;
        }
        
        footer {
            display: flex;
            justify-content: space-between;
            font-size: 13pt;
            color: #475569;
            border-top: 1px solid #1e293b;
            padding-top: 10px;
            padding-bottom: 15px;
            flex-shrink: 0;
        }
        
        .loading {
            color: #38bdf8;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container" style="display:flex; flex-direction:column; height:100vh;">
        <header>
            <div class="title-area">
                <div class="logo-badge">JR貨物</div>
                <h1>輸送状況（北海道着 運行管理）</h1>
            </div>
            <div style="font-size: 16pt; color: #94a3b8; text-align: right;">
                <div>情報更新: <span id="update-time">-</span></div>
                <div style="font-size: 11pt; margin-top: 4px; color: #475569;">サイネージ自動更新: 10分毎</div>
            </div>
        </header>

        <div class="status-panel" id="outer-box">
            <div class="scroll-inner-container" id="inner-container">
                <div id="info-content" class="loading">運行情報を読み込み中...</div>
            </div>
        </div>

        <footer>
            <div>※本画面は社内専用表示です（北海道着のみ抜粋）</div>
            <div>データソース: JR貨物公式HP</div>
        </footer>
    </div>

    <script>
        let scrollIntervalTimer = null;

        function fetchJRStatusOnly() {
            const jsonUrl = `./data.json?cache_bust=${new Date().getTime()}`;

            fetch(jsonUrl, { cache: "no-store" })
                .then(response => {
                    if (!response.ok) throw new Error("data.jsonが見つかりません。");
                    return response.json();
                })
                .then(jsonData => {
                    updateFreightBoard(jsonData);
                })
                .catch(error => {
                    console.error("データ同期エラー:", error);
                    document.getElementById("info-content").innerText = "データの読み込み中にエラーが発生しました。";
                });
        }

        function decodeBase64Utf8(str) {
            let cleanStr = str.replace(/===\s*$/, '==').replace(/==\s*$/, '==').replace(/=\s*$/, '=').trim();
            try {
                return decodeURIComponent(atob(cleanStr).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (e) {
                return decodeURIComponent(escape(atob(cleanStr)));
            }
        }

        function updateFreightBoard(data) {
            const contentArea = document.getElementById("info-content");
            const timeArea = document.getElementById("update-time");
            
            if (data.status === "success") {
                let rawContent = decodeBase64Utf8(data.content);

                // 不要なフッター残骸の削除
                rawContent = rawContent.replace(/TOP.*/g, "").replace(/戻る.*/g, "");

                // 全角スペースや特殊タブ、隠れた改行を一度すべて半角スペース1個に平坦化する
                rawContent = rawContent.replace(/[\r\n\t\u3000]+/g, " ").replace(/  +/g, " ").trim();

                // 最初の挨拶部分をカット
                const startKeyword = "現在の輸送状況";
                const startIndex = rawContent.indexOf(startKeyword);
                if (startIndex !== -1) {
                    rawContent = rawContent.substring(startIndex);
                }

                // 挨拶文の除去
                rawContent = rawContent
                    .replace(/いつも[ＪＲ|JR]貨物をご利用いただき、誠にありがとうございます。\s*/g, "")
                    .replace(/現在、下記の内容により貨物列車に遅れ・その他運行の支障が生じております。\s*/g, "")
                    .replace(/ご迷惑をおかけして誠に申し訳ございません。\s*/g, "");

                // --- ★【ここがポイント】「線区」セクション以降の列車情報を、1列車ずつ分解して北海道着だけを残す処理 ---
                let mainParts = rawContent.split(/線\s*区|線区|影響線区・列車遅延/);
                let infoTop = mainParts[0]; // 挨拶・標題・発生概要
                let trainSection = mainParts[1] || ""; // 列車遅延情報の塊

                let filteredTrainsHtml = "";

                if (trainSection.trim() !== "") {
                    // 全列車を「発日」ごとにバラバラに分解する
                    // 例: ["15日発3053 列車...", "15日発2067 列車..."]
                    let trainList = trainSection.split(/(?=[0-3][0-9]日発)/);

                    // ★【判定基準】北海道内の主要な貨物ターミナル駅（着地）のキーワードリスト
                    // 網羅したい駅名があればここに追加できます
                    const hokkaidoStations = ["札幌タ", "札幌ターミナル", "旭川タ", "旭川ターミナル", "帯広タ", "帯広ターミナル", "苫小牧貨物", "東室蘭", "函館貨物", "北旭川", "新富士", "釧路貨物"];

                    trainList.forEach(trainStr => {
                        let isToHokkaido = false;

                        // 列車の文字列（例: "15日発3053 列車(隅田川→札幌タ) 終着 +44分"）の中に、
                        // 上記の北海道の駅名が1つでも含まれているか、または右矢印の後に北海道の駅があるかチェック
                        hokkaidoStations.forEach(station => {
                            if (trainStr.includes("→" + station) || trainStr.includes(station + ")")) {
                                isToHokkaido = true;
                            }
                        });

                        // 北海道着の列車だけ、綺麗な1行のHTMLに整形して合体させる
                        if (isToHokkaido) {
                            let cleanTrain = trainStr.trim();
                            // 駅名の前後スペース調整（吹田タ や 終 着）
                            cleanTrain = cleanTrain.replace(/\s+(吹田タ)\s+/g, "  $1  ");
                            cleanTrain = cleanTrain.replace(/\s+(終\s*着)\s+/g, "  終 着  ");
                            
                            filteredTrainsHtml += `<span class='indent-text'>${cleanTrain}</span>`;
                        }
                    });
                }

                // もし該当する北海道着の遅れ列車が1本もなかった場合のテキスト
                if (filteredTrainsHtml === "") {
                    filteredTrainsHtml = "<span class='indent-text' style='color:#34d399;'>現在、北海道着の列車に大きな遅延情報はありません。</span>";
                }

                // --- 2. 前半部分（標題・発生概要）の見出しライン化を適用 ---
                let formattedContent = infoTop
                    .replace(/現在の輸送状況\s*([0-9|０-９]+時現在)\s*/g, "<span class='highlight-status'>現在の輸送状況 $1</span><br>")
                    .replace(/\s*標\s*題\s*/g, "<span class='section-header'>■ 標題</span><span class='indent-text'>")
                    .replace(/\s*発生時刻・概要\s*/g, "</span><span class='section-header'>■ 発生時刻・概要</span>")
                    .replace(/\s*\(1\)/g, "<span class='indent-text' style='margin-bottom:5px;'>(1) ")
                    .replace(/\s*\(2\)/g, "</span><span class='indent-text' style='margin-bottom:5px;'>(2) ")
                    .replace(/\s*\(3\)/g, "</span><span class='indent-text' style='margin-bottom:5px;'>(3) ")
                    .replace(/\s*\(4\)/g, "</span><span class='indent-text' style='margin-bottom:5px;'>(4) ")
                    .replace(/\s*\(5\)/g, "</span><span class='indent-text' style='margin-bottom:5px;'>(5) ");

                formattedContent += "</span>"; // 前半の閉じ

                // --- 3. 前半と、抽出した北海道着の列車リストをドッキングする ---
                formattedContent += "<span class='section-header'>■ 線区（北海道着 列車遅延）</span>" + filteredTrainsHtml;

                // 最後の余計な空白を詰める微調整
                formattedContent = formattedContent.replace(/<span class='indent-text'><\/span>/g, "");
                formattedContent = formattedContent.replace(/  +/g, " ").trim();

                contentArea.classList.remove("loading");
                contentArea.innerHTML = formattedContent;
                timeArea.innerText = data.last_update;

                startFreightScrollEngine();
            }
        }

        function startFreightScrollEngine() {
            if (scrollIntervalTimer) clearInterval(scrollIntervalTimer);

            const outerBox = document.getElementById("outer-box");
            const innerBox = document.getElementById("inner-container");
            innerBox.style.top = "40px"; 
            
            setTimeout(() => {
                const outerHeight = outerBox.clientHeight;
                const innerHeight = innerBox.clientHeight;
                
                if (innerHeight > outerHeight - 80) {
                    let currentTop = 40;
                    const maxScroll = -(innerHeight - outerHeight + 60);
                    
                    const timer = setInterval(() => {
                        currentTop -= 1;
                        innerBox.style.top = currentTop + "px";
                        
                        if (currentTop <= maxScroll) {
                            clearInterval(timer);
                            setTimeout(() => {
                                innerBox.style.top = "40px";
                                setTimeout(() => startFreightScrollEngine(), 1000);
                            }, 5000); 
                        }
                    }, 40);
                    
                    scrollIntervalTimer = timer;
                }
            }, 5000); 
        }

        setInterval(fetchJRStatusOnly, 600000); 
        setTimeout(fetchJRStatusOnly, 100);
    </script>
</body>
</html>
