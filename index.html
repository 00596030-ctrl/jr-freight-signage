<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>JR貨物 運行情報サイネージ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            padding: 25px 25px 0 25px;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #38bdf8;
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .title-area { display: flex; align-items: center; }
        .logo-badge {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 6px 16px;
            font-weight: bold;
            font-size: 20pt;
            border-radius: 6px;
            margin-right: 20px;
        }
        h1 { font-size: 28pt; letter-spacing: 1px; }
        .time-area { text-align: right; font-size: 16pt; color: #94a3b8; }
        
        .status-panel {
            background-color: #1e293b;
            border-radius: 16px;
            padding: 40px;
            flex-grow: 1;
            margin-bottom: 15px;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }
        
        .scroll-inner-container {
            position: absolute;
            width: calc(100% - 80px);
            top: 40px;
        }
        
        #info-content {
            font-size: 24pt;
            line-height: 1.8;
            white-space: pre-wrap;
            letter-spacing: 0.5px;
        }
        
        footer {
            display: flex;
            justify-content: space-between;
            font-size: 13pt;
            color: #475569;
            border-top: 1px solid #1e293b;
            padding-top: 10px;
            padding-bottom: 15px;
            flex-shrink: 0;
        }
        
        .loading {
            color: #38bdf8;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container" style="display:flex; flex-direction:column; height:100vh;">
        <header>
            <div class="title-area">
                <div class="logo-badge">JR貨物</div>
                <h1>現在の輸送状況（社内情報サイネージ）</h1>
            </div>
            <div class="time-area">
                <div>情報更新: <span id="update-time">-</span></div>
                <div style="font-size: 11pt; margin-top: 4px; color: #475569;">サイネージ自動更新: 10分毎</div>
            </div>
        </header>

        <div class="status-panel" id="outer-box">
            <div class="scroll-inner-container" id="inner-container">
                <div id="info-content" class="loading">運行情報を読み込み中...</div>
            </div>
        </div>

        <footer>
            <div>※本画面は社内専用表示です（外部非公開）</div>
            <div>データソース: JR貨物公式HP</div>
        </footer>
    </div>

    <script>
        let scrollIntervalTimer = null;

        function fetchJRStatusOnly() {
            const jsonUrl = `./data.json?cache_bust=${new Date().getTime()}`;

            fetch(jsonUrl, { cache: "no-store" })
                .then(response => {
                    if (!response.ok) throw new Error("data.jsonが見つかりません。");
                    return response.json();
                })
                .then(jsonData => {
                    updateFreightBoard(jsonData);
                })
                .catch(error => {
                    console.error("データ同期エラー:", error);
                    document.getElementById("info-content").innerText = "データの読み込み中にエラーが発生しました。";
                });
        }

        function decodeBase64Utf8(str) {
            let cleanStr = str.replace(/===\s*$/, '==').replace(/==\s*$/, '==').replace(/=\s*$/, '=').trim();
            try {
                return decodeURIComponent(atob(cleanStr).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (e) {
                return decodeURIComponent(escape(atob(cleanStr)));
            }
        }

        function updateFreightBoard(data) {
            const contentArea = document.getElementById("info-content");
            const timeArea = document.getElementById("update-time");
            
            if (data.status === "success") {
                let rawContent = decodeBase64Utf8(data.content);

                // 不要なフッター残骸の削除
                rawContent = rawContent.replace(/TOP.*/g, "").replace(/戻る.*/g, "");

                // 全角スペースや特殊タブ、隠れた改行を一度すべて半角スペース1個に平坦化する
                rawContent = rawContent.replace(/[\r\n\t\u3000]+/g, " ").replace(/  +/g, " ").trim();

                // 【最終成形フィルター】確実にキーワードで改行を叩き込む
                let formattedContent = rawContent
                    .replace(/輸送情報の掲示について/g, "【輸送情報の掲示について】\n")
                    
                    // 「お客様各位」の後ろにスペースがあってもなくても確実に改行
                    .replace(/お客様各位\s*/g, "お客様各位\n")
                    // 「輸送情報統括責任者」の直後に確実に改行
                    .replace(/輸送情報統括責任者\s*/g, "輸送情報統括責任者\n")
                    
                    // 各セクションの見出し部分の分離
                    .replace(/ 標 題 /g, "\n\n■ 標題：\n   ")
                    .replace(/ 標題 /g, "\n\n■ 標題：\n   ")
                    .replace(/発生時刻・概要/g, "\n\n■ 発生時刻・概要：\n")
                    
                    // リストの改行
                    .replace(/ \(1\)/g, "\n   (1) ").replace(/ \(2\)/g, "\n   (2) ").replace(/ \(3\)/g, "\n   (3) ").replace(/ \(4\)/g, "\n   (4) ").replace(/ \(5\)/g, "\n   (5) ")
                    
                    // 線区・列車遅延セクションの分離
                    .replace(/ 線 区 /g, "\n\n■ 影響線区・列車遅延：\n")
                    .replace(/ 線区 /g, "\n\n■ 影響線区・列車遅延：\n")
                    
                    // 各列車の遅延情報を1行ずつに強制スプリット
                    .replace(/ ([0-3][0-9]日発)/g, "\n   $1")
                    .replace(/ (列車\()/g, "\n   $1");

                // 最後に全体の余計なスペース詰めの微調整
                formattedContent = formattedContent.replace(/  +/g, " ").trim();

                contentArea.classList.remove("loading");
                contentArea.innerText = formattedContent;
                timeArea.innerText = data.last_update;

                startFreightScrollEngine();
            }
        }

        function startFreightScrollEngine() {
            if (scrollIntervalTimer) clearInterval(scrollIntervalTimer);

            const outerBox = document.getElementById("outer-box");
            const innerBox = document.getElementById("inner-container");
            innerBox.style.top = "40px"; 
            
            setTimeout(() => {
                const outerHeight = outerBox.clientHeight;
                const innerHeight = innerBox.clientHeight;
                
                if (innerHeight > outerHeight - 80) {
                    let currentTop = 40;
                    const maxScroll = -(innerHeight - outerHeight + 60);
                    
                    const timer = setInterval(() => {
                        currentTop -= 1;
                        innerBox.style.top = currentTop + "px";
                        
                        if (currentTop <= maxScroll) {
                            clearInterval(timer);
                            setTimeout(() => {
                                innerBox.style.top = "40px";
                                setTimeout(() => startFreightScrollEngine(), 1000);
                            }, 5000); 
                        }
                    }, 40);
                    
                    scrollIntervalTimer = timer;
                }
            }, 5000); 
        }

        setInterval(fetchJRStatusOnly, 600000); 
        setTimeout(fetchJRStatusOnly, 100);
    </script>
</body>
</html>
