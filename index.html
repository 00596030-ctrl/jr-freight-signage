<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>貨物列車 運行情報サイネージ（時刻計算版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            padding: 25px 25px 0 25px;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #38bdf8;
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .title-area { display: flex; align-items: center; }
        
        .logo-badge {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 10px 24px;
            font-weight: 900;
            font-size: 32pt;
            border-radius: 8px;
            margin-right: 25px;
            letter-spacing: 2px;
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.3);
        }
        
        h1 { font-size: 32pt; letter-spacing: 1px; font-weight: bold; }
        
        .status-panel {
            background-color: #1e293b;
            border-radius: 16px;
            padding: 40px;
            flex-grow: 1;
            margin-bottom: 15px;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }
        
        .scroll-inner-container {
            position: absolute;
            width: calc(100% - 80px);
            top: 40px;
        }
        
        #info-content {
            font-size: 24pt;
            line-height: 1.8;
            white-space: pre-wrap;
            letter-spacing: 0.5px;
        }
        
        .highlight-status {
            display: inline-block;
            background-color: #ef4444;
            color: #ffffff;
            font-weight: bold;
            padding: 5px 20px;
            border-radius: 4px;
            font-size: 26pt;
            margin-bottom: 0px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .section-header {
            display: block;
            background-color: #0284c7;
            color: #ffffff;
            font-weight: bold;
            padding: 8px 20px;
            border-left: 10px solid #38bdf8;
            font-size: 24pt;
            margin-top: 35px;
            margin-bottom: 15px;
            border-radius: 0 6px 6px 0;
        }
        
        .section-header.first-section {
            margin-top: 10px;
        }
        
        .indent-text {
            display: block;
            padding-left: 25px;
            margin-bottom: 10px;
        }

        /* 出発時刻表示用のスタイルを追加 */
        .dept-time-box {
            display: block;
            padding-left: 50px;
            margin-top: -5px;
            margin-bottom: 5px;
            color: #94a3b8;
            font-size: 22pt;
        }
        
        .calc-time-box {
            display: block;
            padding-left: 50px;
            margin-top: 0px;
            margin-bottom: 15px;
            color: #38bdf8;
            font-weight: 900;
            font-size: 24pt;
        }
        .calc-time-box span {
            color: #fbbf24;
            font-weight: 900;
            margin-left: 20px;
        }
        
        footer {
            display: flex;
            justify-content: space-between;
            font-size: 13pt;
            color: #475569;
            border-top: 1px solid #1e293b;
            padding-top: 10px;
            padding-bottom: 15px;
            flex-shrink: 0;
        }
        
        .loading {
            color: #38bdf8;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container" style="display:flex; flex-direction:column; height:100vh;">
        <header>
            <div class="title-area">
                <div class="logo-badge">貨物列車</div>
                <h1>輸送状況（北海道着）</h1>
            </div>
            <div style="font-size: 16pt; color: #94a3b8; text-align: right;">
                <div>情報更新: <span id="update-time">-</span></div>
                <div style="font-size: 11pt; margin-top: 4px; color: #475569;">サイネージ自動更新: 60分毎</div>
            </div>
        </header>

        <div class="status-panel" id="outer-box">
            <div class="scroll-inner-container" id="inner-container">
                <div id="info-content" class="loading">運行情報を読み込み中...</div>
            </div>
        </div>

        <footer>
            <div>※本画面は社内専用表示です（北海道着・主要5列車時刻計算付き）</div>
            <div></div>
        </footer>
    </div>

    <script>
        let scrollIntervalTimer = null;
        const WEEK_DAYS = ["日", "月", "火", "水", "木", "金", "土"];

        // ★時刻表デジタルブックのデータに基づき、出発時刻・日数区分を完全統合
        const FREIGHT_TIMETABLE = {
            "3051": { departure: "0:10",  arrival: "19:00", handover: "19:25", dayPattern: "sameDay" },  // 当日夜間着
            "3053": { departure: "3:35",  arrival: "23:04", handover: "23:29", dayPattern: "sameDay" },  // 当日深夜着
            "3061": { departure: "23:25", arrival: "18:01", handover: "18:30", dayPattern: "nextDay" },  // 前日発➔当日夜間着
            "4061": { departure: "22:10", arrival: "23:48", handover: "00:25", dayPattern: "thirdDay" }, // 3日目未明着（大阪タ発）
            "95":   { departure: "20:10", arrival: "21:35", handover: "22:20", dayPattern: "nextDay" }   // 前日発➔当日深夜着
        };

        function fetchJRStatusOnly() {
            const jsonUrl = `./data.json?cache_bust=${new Date().getTime()}`;
            fetch(jsonUrl, { cache: "no-store" })
                .then(response => {
                    if (!response.ok) throw new Error("data.jsonが見つかりません。");
                    return response.json();
                })
                .then(jsonData => {
                    updateFreightBoard(jsonData);
                })
                .catch(error => {
                    console.error("データ同期エラー:", error);
                    document.getElementById("info-content").innerText = "データの読み込み中にエラーが発生しました。";
                });
        }

        function decodeBase64Utf8(str) {
            let cleanStr = str.replace(/===\s*$/, '==').replace(/==\s*$/, '==').replace(/=\s*$/, '=').trim();
            try {
                return decodeURIComponent(atob(cleanStr).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (e) {
                return decodeURIComponent(escape(atob(cleanStr)));
            }
        }

        // 日付・曜日計算コアエンジン（運行パターン補正付き）
        function calculateTargetDateTime(baseDateStr, departureDayNum, targetTimeStr, delayMinutes, mode, dayPattern) {
            let parts = baseDateStr.split(" ")[0].split("/");
            let year = parseInt(parts[0], 10);
            let month = parseInt(parts[1], 10) - 1;
            let day = parseInt(parts[2], 10);

            // まずは「出発日」のDateオブジェクトを組み立てる
            let targetDate = new Date(year, month, day);
            if (departureDayNum) {
                let currentDay = targetDate.getDate();
                if (currentDay !== departureDayNum) {
                    targetDate.setDate(departureDayNum);
                    if (Math.abs(currentDay - departureDayNum) > 15) {
                        if (currentDay < departureDayNum) { targetDate.setMonth(targetDate.getMonth() - 1); }
                        else { targetDate.setMonth(targetDate.getMonth() + 1); }
                    }
                }
            }

            // 【出発時刻の計算の場合】
            if (mode === "departure") {
                let tParts = targetTimeStr.split(":");
                targetDate.setHours(parseInt(tParts[0], 10));
                targetDate.setMinutes(parseInt(tParts[1], 10));
            } 
            // 【到着・引渡時刻の計算の場合】
            else if (mode === "arrival" || mode === "handover") {
                let tParts = targetTimeStr.split(":");
                targetDate.setHours(parseInt(tParts[0], 10));
                targetDate.setMinutes(parseInt(tParts[1], 10));

                // デジタルブックの運行日数パターンに応じた日付シフト処理
                if (dayPattern === "nextDay") {
                    // 出発日の「翌日」に本来到着するダイヤ
                    targetDate.setDate(targetDate.getDate() + 1);
                } else if (dayPattern === "thirdDay") {
                    // 4061レなど「3日目」に到着するダイヤ
                    // 出発日(1日目) ➔ 走行中(2日目) ➔ 到着(3日目) のため日付を+2する
                    if (mode === "arrival") {
                        targetDate.setDate(targetDate.getDate() + 2); // 23:48着
                    } else if (mode === "handover") {
                        // 引渡は00:25なので日付をさらに+1（計3日後）進める
                        targetDate.setDate(targetDate.getDate() + 3);
                    }
                }

                // 遅延分数を加算
                if (delayMinutes > 0) {
                    targetDate.setMinutes(targetDate.getMinutes() + delayMinutes);
                }
            }

            let m = targetDate.getMonth() + 1;
            let d = targetDate.getDate();
            let w = WEEK_DAYS[targetDate.getDay()];
            let h = String(targetDate.getHours()).padStart(2, '0');
            let min = String(targetDate.getMinutes()).padStart(2, '0');

            return `${m}月${d}日(${w}) ${h}:${min}`;
        }

        function updateFreightBoard(data) {
            const contentArea = document.getElementById("info-content");
            const timeArea = document.getElementById("update-time");
            
            if (data.status === "success") {
                const baseUpdateDateTime = data.last_update;

                let rawContent = decodeBase64Utf8(data.content);
                rawContent = rawContent.replace(/TOP.*/g, "").replace(/戻る.*/g, "");
                rawContent = rawContent.replace(/[\r\n\t\u3000]+/g, " ").replace(/  +/g, " ").trim();

                rawContent = rawContent.replace(/JR貨物/g, "貨物列車").replace(/JR/g, "貨物列車");

                const startKeyword = "現在の輸送状況";
                const startIndex = rawContent.indexOf(startKeyword);
                if (startIndex !== -1) {
                    rawContent = rawContent.substring(startIndex);
                }

                rawContent = rawContent.replace(/(現在の輸送状況\s*[0-9|０-９]+時現在\s*).*?(\s*標\s*題)/g, "$1 $2");

                const hokkaidoKeywords = [
                    "北海道", "室蘭線", "函館線", "千歳線", "根室線", "石勝線", "宗谷線", "釧網線", 
                    "札幌", "旭川", "帯広", "苫小牧", "室蘭", "函館", "長万部", "五稜郭", "東室蘭", 
                    "追分", "新富士", "釧路", "北旭川", "礼文", "石倉", "石谷", "国縫"
                ];

                const honshuDestinations = [
                    "隅田川", "東京タ", "新座タ", "越谷タ", "百済タ", "吹田タ", "梅田タ", "神戸タ", 
                    "名古屋タ", "稲沢", "静岡貨物", "岡山タ", "広島タ", "福岡タ", "北九州タ", "宮城野", 
                    "仙台タ", "新潟タ", "富山タ", "金沢タ", "梶ヶ谷", "川崎貨物", "相模", "熊谷タ"
                ];

                const westJapanLines = [
                    "山陽線", "東海道線", "鹿児島線", "日豊線", "長崎線", "佐世保線", "筑肥線", 
                    "北陸線", "中央線", "関西線", "紀勢線", "山陰線", "伯備線", "予讃線", "土讃線"
                ];

                let mainParts = rawContent.split(/線\s*区|線区|影響線区・列車遅延/);
                let infoTop = mainParts[0]; 
                let trainSection = mainParts[1] || ""; 

                infoTop = infoTop.replace(/各地区における輸送障害/g, "北海道地区における輸送障害");
                infoTop = infoTop.replace(/北海道[、\s]*関東[、\s]*中部[、\s]*中国地区における輸送障害/g, "北海道地区における輸送障害");
                infoTop = infoTop.replace(/北海道.*?における輸送障害/g, "北海道地区における輸送障害");

                // ─────────── 1. 後半：遅延列車リストの抽出 ───────────
                let filteredTrainsHtml = "";
                let hasHokkaidoDelay = false; 

                if (trainSection.trim() !== "") {
                    let trainList = trainSection.split(/(?=[0-3][0-9]日発)/);

                    trainList.forEach(trainStr => {
                        let isToHokkaido = false;
                        hokkaidoKeywords.forEach(kw => { if (trainStr.includes(kw)) { isToHokkaido = true; } });
                        honshuDestinations.forEach(honshu => { if (trainStr.includes("➔" + honshu) || trainStr.includes("→" + honshu)) { isToHokkaido = false; } });

                        let arrowParts = trainStr.split(/➔|→/);
                        if (arrowParts.length > 1) {
                            let destinationText = arrowParts[1].split(")")[0];
                            let hasHokkaidoTarget = false;
                            const targetArrivals = ["札幌", "旭川", "苫小牧", "帯広", "釧路", "函館", "五稜郭", "終着"];
                            targetArrivals.forEach(ta => { if (destinationText.includes(ta)) { hasHokkaidoTarget = true; } });
                            if (!hasHokkaidoTarget) { isToHokkaido = false; }
                        }

                        if (isToHokkaido) {
                            hasHokkaidoDelay = true; 
                            let cleanTrain = trainStr.trim();
                            cleanTrain = cleanTrain.replace(/\s+(吹田タ)\s+/g, "  $1  ");
                            cleanTrain = cleanTrain.replace(/\s+(終\s*着)\s+/g, "  終 着  ");
                            
                            filteredTrainsHtml += `<span class='indent-text'><span style='color:#f43f5e; font-weight:bold; margin-right:8px;'>➔</span>${cleanTrain}</span>`;

                            let dayMatch = cleanTrain.match(/([0-3]?[0-9])日発/);
                            let departureDayNum = dayMatch ? parseInt(dayMatch[1], 10) : null;

                            let foundTrainNo = null;
                            Object.keys(FREIGHT_TIMETABLE).forEach(no => {
                                if (cleanTrain.includes(no)) { foundTrainNo = no; }
                            });

                            if (foundTrainNo) {
                                let delayMin = 0;
                                let hourMatch = cleanTrain.match(/\+([0-9|０-９]+)時間/);
                                let minMatch = cleanTrain.match(/(?:時間|\+)([0-9|０-９]+)分/);
                                
                                if (hourMatch) delayMin += parseInt(hourMatch[1], 10) * 60;
                                if (minMatch) delayMin += parseInt(minMatch[1], 10);

                                if (delayMin > 0) {
                                    let 定時 = FREIGHT_TIMETABLE[foundTrainNo];
                                    
                                    // ① 出発日時のフォーマット（遅延は足さない）
                                    let departureFormatted = calculateTargetDateTime(baseUpdateDateTime, departureDayNum, 定時.departure, 0, "departure", 定時.dayPattern);
                                    
                                    // ② 到着・引渡日時のフォーマット（遅延を足し、運行日数パターンで補正）
                                    let arrivalEstFormatted = calculateTargetDateTime(baseUpdateDateTime, departureDayNum, 定時.arrival, delayMin, "arrival", 定時.dayPattern);
                                    let handoverEstFormatted = calculateTargetDateTime(baseUpdateDateTime, departureDayNum, 定時.handover, delayMin, "handover", 定時.dayPattern);
                                    
                                    // 画面へ出力
                                    filteredTrainsHtml += `<span class='dept-time-box'>【出発】 ${departureFormatted} 発</span>`;
                                    filteredTrainsHtml += `<span class='calc-time-box'>➔ 札幌タ ${arrivalEstFormatted} 着予定 <span>(引き渡し ${handoverEstFormatted} 予定)</span></span>`;
                                }
                            }
                        }
                    });
                }

                if (filteredTrainsHtml === "") {
                    filteredTrainsHtml = "<span class='indent-text' style='color:#34d399;'>現在、北海道着の列車に大きな遅延情報はありません。</span>";
                }

                // ─────────── 2. 前半：発生時刻・概要の抽出 ───────────
                let summaryList = infoTop.split(/(?=\([1-9]\))/);
                let cleanTopHeader = summaryList[0]; 
                let filteredSummaryHtml = "";

                for (let i = 1; i < summaryList.length; i++) {
                    let item = summaryList[i];
                    let shouldShowSummary = false;
                    
                    if (hasHokkaidoDelay) {
                        shouldShowSummary = true;
                        westJapanLines.forEach(wLine => { if (item.includes(wLine)) { shouldShowSummary = false; } });
                    } else {
                        hokkaidoKeywords.forEach(kw => { if (item.includes(kw)) { shouldShowSummary = true; } });
                    }

                    if (shouldShowSummary) {
                        let cleanedItem = item.replace(/^\([1-9]\)/, "").trim(); 
                        filteredSummaryHtml += `<span class='indent-text' style='margin-bottom:5px;'><span style='color:#fbbf24; font-weight:bold; margin-right:8px;'>⚠</span>${cleanedItem}</span>`;
                    }
                }

                // ─────────── 3. 最終組み立て ───────────
                let finalHtml = cleanTopHeader
                    .replace(/現在の輸送状況\s*([0-9|０-９]+時現在)\s*/g, "<span class='highlight-status'>現在の輸送状況 $1</span><br>")
                    .replace(/\s*標\s*題\s*/g, "<span class='section-header first-section'>■ 標題</span><span class='indent-text'>")
                    .replace(/\s*発生時刻・概要\s*/g, "</span><span class='section-header'>■ 発生時刻・概要</span>");

                finalHtml += "</span>" + filteredSummaryHtml;
                finalHtml += "<span class='section-header'>■ 線区（北海道着 列車遅延）</span>" + filteredTrainsHtml;

                finalHtml = finalHtml.replace(/  +/g, " ").trim();
                contentArea.classList.remove("loading");
                contentArea.innerHTML = finalHtml;
                timeArea.innerText = baseUpdateDateTime;

                startFreightScrollEngine();
            }
        }

        function startFreightScrollEngine() {
            if (scrollIntervalTimer) clearInterval(scrollIntervalTimer);
            const outerBox = document.getElementById("outer-box");
            const innerBox = document.getElementById("inner-container");
            innerBox.style.top = "40px"; 
            
            setTimeout(() => {
                const outerHeight = outerBox.clientHeight;
                const innerHeight = innerBox.clientHeight;
                if (innerHeight > outerHeight - 80) {
                    let currentTop = 40;
                    const maxScroll = -(innerHeight - outerHeight + 60);
                    const timer = setInterval(() => {
                        currentTop -= 1;
                        innerBox.style.top = currentTop + "px";
                        if (currentTop <= maxScroll) {
                            clearInterval(timer);
                            setTimeout(() => {
                                innerBox.style.top = "40px";
                                setTimeout(() => startFreightScrollEngine(), 3000);
                            }, 3000); 
                        }
                    }, 40);
                    scrollIntervalTimer = timer;
                }
            }, 3000); 
        }

        setInterval(fetchJRStatusOnly, 600000); 
        setTimeout(fetchJRStatusOnly, 100);
    </script>
</body>
</html>
